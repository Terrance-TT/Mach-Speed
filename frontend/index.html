<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mach-Speed — Deployment Readiness</title>
<style>
  :root {
    --bg: #f7f5f1;
    --card: #ffffff;
    --border: #e5e0d8;
    --text: #2b2723;
    --muted: #8a8177;
    --pass: #2e7d4f;
    --pass-bg: #eef5f0;
    --fail: #b3402e;
    --fail-bg: #faefec;
    --checkit: #a5741a;
    --checkit-bg: #faf4e6;
    --na: #8a8177;
    --na-bg: #f2f0ec;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 48px 16px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 15px; margin-top: 4px; }

  /* ── Input ── */
  .search-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    gap: 12px;
  }
  .search-card input {
    flex: 1;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .search-card input:focus { border-color: var(--text); }
  .search-card button {
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--text);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .search-card button:disabled { opacity: 0.5; cursor: default; }

  /* ── States ── */
  .state { margin-top: 24px; padding: 16px 20px; border-radius: 10px; font-size: 15px; display: none; }
  .state.visible { display: block; }
  #loading { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
  #error { background: var(--fail-bg); border: 1px solid #eccfc8; color: var(--fail); }

  /* ── Results ── */
  #results { margin-top: 32px; display: none; }
  #results.visible { display: block; }

  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }
  .score-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .repo-name { font-size: 18px; font-weight: 700; word-break: break-all; }
  .repo-type {
    display: inline-block;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    background: var(--na-bg);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .score-num { text-align: right; }
  .score-num .big { font-size: 44px; font-weight: 800; line-height: 1; }
  .score-num .of { font-size: 15px; color: var(--muted); }
  .verdict { font-size: 14px; font-weight: 600; margin-top: 4px; }

  .score-bar { height: 8px; background: var(--na-bg); border-radius: 4px; margin-top: 16px; overflow: hidden; }
  .score-bar div { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .summary { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  .sum-item {
    flex: 1;
    min-width: 110px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    background: var(--card);
  }
  .sum-item .count { font-size: 24px; font-weight: 700; }
  .sum-item .label { font-size: 13px; color: var(--muted); }

  /* ── Checks ── */
  .checks { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
  .check {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .check-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .check-body { flex: 1; min-width: 0; }
  .check-name { font-size: 15px; font-weight: 600; }
  .check-msg { font-size: 13.5px; color: var(--muted); margin-top: 2px; }
  .badges { display: flex; gap: 6px; flex-shrink: 0; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .b-pass { color: var(--pass); background: var(--pass-bg); }
  .b-fail { color: var(--fail); background: var(--fail-bg); }
  .b-check-it { color: var(--checkit); background: var(--checkit-bg); }
  .b-not-applicable { color: var(--na); background: var(--na-bg); }
  .b-conf { color: var(--muted); background: var(--na-bg); text-transform: none; }

  .check details { border-top: 1px solid var(--border); }
  .check summary {
    cursor: pointer;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    user-select: none;
  }
  .check summary:hover { color: var(--text); }
  .findings { padding: 4px 16px 14px 16px; }
  .finding {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 8px 0;
    border-top: 1px dashed var(--border);
    font-size: 13.5px;
  }
  .finding:first-child { border-top: none; }
  .finding .loc {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12.5px;
    color: var(--muted);
    word-break: break-all;
    flex-shrink: 0;
    min-width: 140px;
  }
  .finding .issue { flex: 1; }
  .sev { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
  .sev-critical, .sev-high { color: var(--fail); }
  .sev-medium { color: var(--checkit); }
  .sev-low, .sev-info { color: var(--na); }

  footer { margin-top: 40px; text-align: center; font-size: 13px; color: var(--muted); }

  @media (max-width: 560px) {
    .search-card { flex-direction: column; }
    .score-top { flex-direction: column; }
    .score-num { text-align: left; }
    .finding { flex-direction: column; gap: 2px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Mach-Speed</h1>
    <p>Check if a GitHub repo is ready to deploy.</p>
  </header>

  <form class="search-card" id="form">
    <input
      type="text"
      id="repoInput"
      placeholder="owner/repo or https://github.com/owner/repo"
      autocomplete="off"
      spellcheck="false"
    />
    <button type="submit" id="analyzeBtn">Analyze</button>
  </form>

  <div class="state" id="loading">Analyzing repository… this can take a few seconds.</div>
  <div class="state" id="error"></div>

  <section id="results">
    <div class="score-card">
      <div class="score-top">
        <div>
          <div class="repo-name" id="repoName"></div>
          <span class="repo-type" id="repoType"></span>
        </div>
        <div class="score-num">
          <span class="big" id="scoreBig"></span><span class="of"> / 10</span>
          <div class="verdict" id="verdict"></div>
        </div>
      </div>
      <div class="score-bar"><div id="scoreBar" style="width:0%"></div></div>
      <div class="summary">
        <div class="sum-item"><div class="count" id="sumPassed" style="color:var(--pass)">0</div><div class="label">Passed</div></div>
        <div class="sum-item"><div class="count" id="sumFailed" style="color:var(--fail)">0</div><div class="label">Failed</div></div>
        <div class="sum-item"><div class="count" id="sumCheckIt" style="color:var(--checkit)">0</div><div class="label">Check it</div></div>
        <div class="sum-item"><div class="count" id="sumNa" style="color:var(--na)">0</div><div class="label">N/A</div></div>
      </div>
    </div>

    <div class="checks" id="checks"></div>
  </section>

  <footer>Modular static analysis engine for deployment readiness</footer>
</div>

<script>
const form = document.getElementById('form');
const input = document.getElementById('repoInput');
const btn = document.getElementById('analyzeBtn');
const loadingEl = document.getElementById('loading');
const errorEl = document.getElementById('error');
const resultsEl = document.getElementById('results');

const STATUS_ORDER = { 'fail': 0, 'check-it': 1, 'pass': 2, 'not-applicable': 3 };
const STATUS_LABEL = { 'pass': 'Pass', 'fail': 'Fail', 'check-it': 'Check it', 'not-applicable': 'N/A' };
const STATUS_COLOR = { 'pass': 'var(--pass)', 'fail': 'var(--fail)', 'check-it': 'var(--checkit)', 'not-applicable': 'var(--na)' };

function scoreColor(score) {
  if (score >= 9) return 'var(--pass)';
  if (score >= 7) return '#4a7d3c';
  if (score >= 5) return 'var(--checkit)';
  if (score >= 3) return '#b3602e';
  return 'var(--fail)';
}

function showState(which) {
  loadingEl.classList.toggle('visible', which === 'loading');
  errorEl.classList.toggle('visible', which === 'error');
  if (which !== 'error') errorEl.textContent = '';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const repoUrl = input.value.trim();
  if (!repoUrl) return;

  btn.disabled = true;
  resultsEl.classList.remove('visible');
  showState('loading');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repoUrl }),
    });
    const data = await res.json().catch(() => null);

    if (!res.ok) {
      throw new Error((data && data.error) || `Server error (${res.status})`);
    }
    if (!data || typeof data.score !== 'number') {
      throw new Error('Unexpected response from server');
    }

    showState(null);
    render(data);
  } catch (err) {
    showState('error');
    errorEl.textContent = err.message === 'Failed to fetch'
      ? 'Could not reach the API. Make sure the Mach-Speed server is running (npm start).'
      : err.message;
  } finally {
    btn.disabled = false;
  }
});

function render(data) {
  // Score header
  document.getElementById('repoName').textContent = data.repo || '';
  document.getElementById('repoType').textContent = data.repoType || 'unknown';

  const score = data.score;
  document.getElementById('scoreBig').textContent = score;
  const color = scoreColor(score);
  document.getElementById('scoreBig').style.color = color;

  const verdictEl = document.getElementById('verdict');
  verdictEl.textContent = data.verdict || '';
  verdictEl.style.color = color;

  const bar = document.getElementById('scoreBar');
  bar.style.width = (score * 10) + '%';
  bar.style.background = color;

  // Summary
  const s = data.summary || {};
  document.getElementById('sumPassed').textContent = s.passed ?? 0;
  document.getElementById('sumFailed').textContent = s.failed ?? 0;
  document.getElementById('sumCheckIt').textContent = s.checkIt ?? 0;
  document.getElementById('sumNa').textContent = s.notApplicable ?? 0;

  // Checks — failures first
  const checks = (Array.isArray(data.checks) ? data.checks : []).slice().sort(
    (a, b) => (STATUS_ORDER[(a && a.status)] ?? 9) - (STATUS_ORDER[(b && b.status)] ?? 9)
  );

  const container = document.getElementById('checks');
  container.innerHTML = '';

  for (const raw of checks) {
    try {
      container.appendChild(buildCheckCard(raw || {}));
    } catch (err) {
      // A malformed check must never block the rest of the report
      const fallback = document.createElement('div');
      fallback.className = 'check';
      fallback.innerHTML = '<div class="check-head"><span class="status-dot" style="background:var(--na)"></span><div class="check-body"><div class="check-name"></div><div class="check-msg">Could not display this check</div></div></div>';
      fallback.querySelector('.check-name').textContent = String((raw && (raw.name || raw.id)) || 'unknown');
      container.appendChild(fallback);
    }
  }

  resultsEl.classList.add('visible');
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function str(v) {
  if (v === null || v === undefined) return '';
  return typeof v === 'object' ? JSON.stringify(v) : String(v);
}

function buildCheckCard(c) {
  const card = document.createElement('div');
  card.className = 'check';

  const status = str(c.status) || 'check-it';
  const findings = Array.isArray(c.findings) ? c.findings.filter(Boolean) : [];
  const head = document.createElement('div');
  head.className = 'check-head';
  head.innerHTML = `
      <span class="status-dot" style="background:${STATUS_COLOR[status] || 'var(--na)'}"></span>
      <div class="check-body">
        <div class="check-name"></div>
        <div class="check-msg"></div>
      </div>
      <div class="badges">
        <span class="badge b-${status}">${STATUS_LABEL[status] || status}</span>
        <span class="badge b-conf"></span>
      </div>`;
  head.querySelector('.check-name').textContent = str(c.name || c.id);
  head.querySelector('.check-msg').textContent = str(c.message);
  head.querySelector('.b-conf').textContent = str(c.confidence) + ' conf.';
  card.appendChild(head);

  if (findings.length > 0) {
    const det = document.createElement('details');
    const sum = document.createElement('summary');
    sum.textContent = `${findings.length} finding${findings.length === 1 ? '' : 's'}`;
    det.appendChild(sum);

    const list = document.createElement('div');
    list.className = 'findings';
    for (const f of findings) {
      const row = document.createElement('div');
      row.className = 'finding';

      const isObj = f && typeof f === 'object';
      const loc = document.createElement('span');
      loc.className = 'loc';
      const file = isObj ? str(f.file) : '';
      const line = isObj && f.line ? ':' + str(f.line) : '';
      loc.textContent = file + line;

      const issue = document.createElement('span');
      issue.className = 'issue';
      issue.textContent = isObj ? (str(f.issue) || str(f.message) || JSON.stringify(f)) : str(f);

      const sev = document.createElement('span');
      const sevText = isObj ? str(f.severity) : '';
      sev.className = 'sev sev-' + (sevText || 'info').toLowerCase();
      sev.textContent = sevText;

      row.append(loc, issue, sev);
      list.appendChild(row);
    }
    det.appendChild(list);
    card.appendChild(det);
  }

  return card;
}
</script>
</body>
</html>
