name: Auto-Fix + Verify
on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours (the heartbeat — always resumes the loop)
  workflow_dispatch:
    inputs:
      chain:
        description: 'Internal: chain depth for continuous mode (leave at 0)'
        required: false
        type: string
        default: '0'
concurrency:
  group: self-heal
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write          # needed for the Continuous-mode re-dispatch
env:
  MACH_SPEED_REPO_CACHE: repo-cache   # snapshot dir shared by all steps in this job
jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run auto-heal (test specialists, generate evidence)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node auto-heal.js --output ./evidence
        timeout-minutes: 25
      - name: Run auto-fix (AI proposes rewrites — nothing merges yet)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_MODEL: kimi-k2.6
        run: node auto-fix.js --evidence ./evidence --out ./proposed --max-fixes 8
        timeout-minutes: 60
      - name: Run auto-verify (test, retry, merge only verified winners)
        if: always()   # even if auto-fix timed out, verify whatever it produced
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_MODEL: kimi-k2.6
        run: node auto-verify.js --evidence ./evidence --proposed ./proposed --pr --rounds 2
        timeout-minutes: 75
      - name: Upload evidence + reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-report
          path: |
            evidence/
            proposed/
            autofix-report.md
            autofix-report.json
            verify-report.md
            verify-report.json
          retention-days: 30
      - name: Continuous mode — re-run while there's still work (max 4 in a row)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHAIN: ${{ inputs.chain || '0' }}
        run: |
          WORK=$(node -e "try{const r=require('./verify-report.json');console.log((r.merged||[]).length+(r.sentBack||[]).length+(r.lintRejected||[]).length)}catch(e){console.log(0)}")
          NEXT=$(( CHAIN + 1 ))
          if [ "$WORK" -gt 0 ] && [ "$NEXT" -lt 4 ]; then
            echo "Work remains ($WORK item(s)) — re-running immediately (chain $NEXT/3)"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/auto-fix.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"chain\":\"$NEXT\"}}")
            if [ "$CODE" = "204" ]; then
              echo "Re-dispatched OK."
            else
              echo "::warning::Re-dispatch returned HTTP $CODE — no problem: the every-4-hours schedule will pick it up."
            fi
          else
            echo "Queue clear or chain cap reached — resting until the next scheduled run."
          fi
