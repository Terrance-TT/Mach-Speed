name: Auto-Heal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-heal
        run: node auto-heal.js --output ./evidence
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
          # auto-heal.js v2 picks this up automatically (60 -> 5000 req/hr, no more 403 cascades)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 10

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: specialist-evidence
          path: evidence/*.md
          retention-days: 30

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heal-report
          path: evidence/report.json
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          echo "## Auto-Heal Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f evidence/README.md ]; then
            cat evidence/README.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No evidence generated -- check logs" >> $GITHUB_STEP_SUMMARY
          fi
